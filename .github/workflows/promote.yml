name: promote
on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: promote
  cancel-in-progress: false
jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: production·main fetch
        run: git fetch origin main production 2>/dev/null || git fetch origin main
      - name: accepted-run tip 계산 → production FF
        env:
          TRACKER_BOOT_API_KEY: ${{ secrets.TRACKER_BOOT_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIP=$(node commands/promote-target.mjs .)
          if [ -z "$TIP" ]; then echo "promote할 accepted 스토리 없음 (production 그대로)"; exit 0; fi
          CUR=$(gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/production" --jq .object.sha 2>/dev/null || true)
          if [ "$CUR" = "$TIP" ]; then echo "production 이미 $TIP — no-op"; exit 0; fi
          gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/production" -X PATCH -f sha="$TIP" -F force=false \
            && echo "✅ production → $TIP 전진. production 빌드가 시작됩니다." \
            || echo "❌ promote 건너뜀 (non-FF 거부 등). production 그대로."
